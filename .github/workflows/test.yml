name: Test
on: [push]
jobs:
  my_first_job:
   runs-on: ubuntu-latest
   steps:
     - name: checkout repository
       uses: actions/checkout@v3
     - name: Setup Node.js
       uses: actions/setup-node@v3 
       with: 
         node-version: '20'
     - name: Say Hello
       run: echo "Hello Github Actions!"
     - name: List files
       run: ls -R
     - name: setup npm ci
       run: npm ci
     - name: Run Linter
       run: npm run lint
     - name: Documentation
       run: npm run doc 
     - name: Upload Documentation
       uses: actions/upload-artifact@v4
       with:
         name: documentation-site
         path: docs/
         
       
    
   
 
